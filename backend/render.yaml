services:
  - type: web
    name: habit-tracker-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FRONTEND_URL
        value: https://your-app.vercel.app
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
